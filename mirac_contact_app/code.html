<script>
(function () {
  var form = document.getElementById('contact-form-mobile');
  var btn = document.getElementById('submit-btn');
  var label = document.getElementById('submit-label');
  var status = document.getElementById('form-status');

  function setError(id, msg) {
    var el = document.getElementById('err-' + id);
    if (!el) return;
    if (msg) { el.textContent = msg; el.classList.remove('hidden'); }
    else { el.textContent = ''; el.classList.add('hidden'); }
  }

  function clearErrors() {
    ['name','email','type','brief'].forEach(function(k){ setError(k, ''); });
  }

  function showStatus(msg, isError) {
    status.textContent = msg;
    status.className = 'text-[10px] uppercase tracking-widest py-3 px-4 border font-bold';
    if (isError) {
      status.classList.add('border-[#ff7351]','text-[#ff7351]','bg-[#ff7351]/10');
    } else {
      status.classList.add('border-[#C6FF00]','text-[#C6FF00]','bg-[#C6FF00]/10');
    }
    status.classList.remove('hidden');
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearErrors();
    status.classList.add('hidden');

    var name = document.getElementById('f-name').value.trim();
    var email = document.getElementById('f-email').value.trim();
    var projectType = document.getElementById('f-type').value;
    var brief = document.getElementById('f-brief').value.trim();

    btn.disabled = true;
    label.textContent = 'SENDING...';

    fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, email: email, projectType: projectType, brief: brief })
    })
    .then(function(res) { return res.json().then(function(d){ return { ok: res.ok, data: d }; }); })
    .then(function(result) {
      btn.disabled = false;
      if (result.ok) {
        label.textContent = 'INQUIRY SENT';
        btn.classList.remove('bg-[#C6FF00]','text-black');
        btn.classList.add('bg-transparent','border','border-[#C6FF00]','text-[#C6FF00]');
        showStatus('Inquiry received — we will be in contact shortly.', false);
        form.reset();
      } else {
        label.textContent = 'SEND INQUIRY';
        var errs = result.data.errors || {};
        Object.keys(errs).forEach(function(k){ setError(k, errs[k]); });
        if (result.data.error) showStatus(result.data.error, true);
      }
    })
    .catch(function() {
      btn.disabled = false;
      label.textContent = 'SEND INQUIRY';
      showStatus('Connection failed. Please try again.', true);
    });
  });
})();
</script>
